<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感染方塊 - 驗證頁面</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg: #08120f;
            --surface: rgba(15, 35, 29, 0.92);
            --surface-soft: rgba(23, 51, 43, 0.74);
            --line: rgba(154, 230, 187, 0.22);
            --text: #e8fff2;
            --text-dim: #9cc9ae;
            --accent: #45e27d;
            --accent-dark: #1c9b50;
            --warning: #f8c95c;
            --danger: #ff7a7a;
            --cell: #eef7f0;
            --cell-line: #c3d9c8;
            --infected: #17251f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 28px 16px 36px;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 10%, rgba(49, 176, 96, 0.18), transparent 30%),
                radial-gradient(circle at 88% 90%, rgba(23, 110, 69, 0.2), transparent 34%),
                var(--bg);
            font-family: "Noto Sans TC", sans-serif;
            touch-action: manipulation;
        }

        body::before {
            position: fixed;
            inset: 0;
            pointer-events: none;
            content: "";
            opacity: 0.28;
            background-image:
                linear-gradient(rgba(132, 216, 165, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(132, 216, 165, 0.08) 1px, transparent 1px);
            background-size: 34px 34px;
        }

        .page {
            position: relative;
            width: min(100%, 760px);
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 18px;
            text-align: center;
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.26em;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            text-shadow: 0 0 28px rgba(69, 226, 125, 0.28);
        }

        .intro {
            margin: 10px auto 0;
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--surface);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }

        .rules {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
            padding: 14px;
        }

        .rule {
            min-height: 78px;
            padding: 11px;
            border: 1px solid rgba(154, 230, 187, 0.14);
            border-radius: 14px;
            background: rgba(154, 230, 187, 0.045);
            color: var(--text-dim);
            font-size: 0.78rem;
            line-height: 1.55;
        }

        .rule strong {
            display: block;
            margin-bottom: 4px;
            color: var(--accent);
            font-size: 0.82rem;
        }

        .game {
            padding: clamp(14px, 4vw, 24px);
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .counter {
            color: var(--text-dim);
            font-size: 0.86rem;
            letter-spacing: 0.08em;
        }

        .counter span {
            margin-right: 3px;
            color: var(--accent);
            font-size: 1.55rem;
            font-weight: 900;
        }

        .phase {
            padding: 6px 10px;
            border: 1px solid rgba(154, 230, 187, 0.2);
            border-radius: 999px;
            color: var(--text-dim);
            background: var(--surface-soft);
            font-size: 0.76rem;
            font-weight: 700;
        }

        .phase.ready {
            border-color: rgba(69, 226, 125, 0.55);
            color: var(--accent);
        }

        .grid-wrap {
            padding: clamp(7px, 2vw, 12px);
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 15px;
            background: #10271f;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: clamp(3px, 0.8vw, 6px);
        }

        .cell {
            position: relative;
            display: block;
            min-width: 0;
            aspect-ratio: 1;
            padding: 0;
            border: 1px solid var(--cell-line);
            border-radius: clamp(3px, 0.8vw, 6px);
            background: var(--cell);
            cursor: pointer;
            touch-action: manipulation;
            transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        .cell:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        .cell:focus-visible {
            outline: 3px solid var(--warning);
            outline-offset: 2px;
        }

        .cell.infected {
            border-color: #060c09;
            background: var(--infected);
            box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.2);
        }

        .cell.hole {
            border-color: transparent;
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .cell.infected::after {
            position: absolute;
            inset: 27%;
            border-radius: 50%;
            background: rgba(69, 226, 125, 0.7);
            box-shadow: 0 0 12px rgba(69, 226, 125, 0.8);
            content: "";
        }

        .cell.spreading {
            animation: spread 500ms ease-out;
        }

        @keyframes spread {
            0% {
                transform: scale(0.62);
                border-color: var(--accent);
                box-shadow: 0 0 0 0 rgba(69, 226, 125, 0.75);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(69, 226, 125, 0);
            }
            100% {
                transform: scale(1);
            }
        }

        .message {
            min-height: 26px;
            margin: 15px 0 11px;
            color: var(--text-dim);
            font-size: 0.87rem;
            line-height: 1.5;
            text-align: center;
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--accent);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
        }

        button {
            border: 0;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
        }

        button:not(.cell) {
            min-height: 48px;
        }

        button:not(:disabled):hover {
            transform: translateY(-2px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.38;
        }

        .infect-button {
            color: #07140c;
            background: var(--accent);
            box-shadow: 0 0 22px rgba(69, 226, 125, 0.26);
        }

        .reset-button {
            padding: 0 16px;
            border: 1px solid var(--line);
            color: var(--text-dim);
            background: var(--surface-soft);
        }

        .result-card {
            width: 100%;
            margin: 0 0 12px;
            padding: 18px;
            border: 1px solid rgba(69, 226, 125, 0.55);
            border-radius: 14px;
            background: #10271f;
            box-shadow: 0 0 24px rgba(69, 226, 125, 0.16);
            text-align: center;
        }

        .result-card[hidden] {
            display: none;
        }

        .result-card h2 {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 1.45rem;
        }

        .result-card p {
            margin: 0;
            color: var(--text-dim);
            line-height: 1.7;
        }

        .secret {
            margin: 18px 0;
            padding: 13px;
            border: 1px dashed rgba(69, 226, 125, 0.68);
            border-radius: 12px;
            color: #fff;
            background: rgba(69, 226, 125, 0.08);
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 0.16em;
        }

        .close-button {
            width: 100%;
            color: #07140c;
            background: var(--accent);
        }

        .failure-card {
            border-color: rgba(255, 122, 122, 0.58);
            box-shadow: 0 0 24px rgba(255, 122, 122, 0.12);
        }

        .failure-card h2 {
            color: var(--danger);
        }

        .confirm-button {
            width: 100%;
            margin-top: 18px;
            color: #240707;
            background: var(--danger);
        }

        @media (max-width: 560px) {
            body {
                padding: 18px 10px 24px;
            }

            .rules {
                grid-template-columns: 1fr;
            }

            .rule {
                min-height: auto;
            }

            .game {
                padding: 12px;
            }

            .grid-wrap {
                padding: 6px;
            }

            .grid {
                gap: 3px;
            }

            .cell {
                border-radius: 3px;
            }

            button:not(.cell) {
                min-height: 54px;
            }
        }

        @media (pointer: coarse) {
            button:not(.cell) {
                min-height: 56px;
            }

            .cell:hover:not(:disabled) {
                transform: none;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="hero">
            <p class="eyebrow">CELLULAR CONTAMINATION TEST</p>
            <h1>感染方塊</h1>
            <p class="intro">選擇最多 12 個初始感染源，讓感染擴散至空洞外的整個區域。</p>
        </header>

        <section class="rules panel" aria-label="遊戲規則">
            <div class="rule"><strong>01 設置感染源</strong>點選格子可感染或清除，最多選擇 12 格。</div>
            <div class="rule"><strong>02 啟動感染</strong>選擇至少 1 格後，即可按下「開始感染」。</div>
            <div class="rule"><strong>03 擴散規則</strong>空白格子的上下左右中，若至少兩邊已感染，該格也會被感染。</div>
        </section>

        <section class="game panel">
            <div class="status-row">
                <div class="counter"><span id="selectedCount">0</span>/ 12 初始感染源</div>
                <div class="phase" id="phaseText">設置感染源</div>
            </div>

            <div class="grid-wrap">
                <div class="grid" id="gameGrid" role="grid" aria-label="10 乘 7 感染方塊網格，中央有 4 乘 3 空洞"></div>
            </div>

            <p class="message" id="message" aria-live="polite">請選擇至少 1 個初始感染源。</p>

            <section class="result-card" id="successLayer" role="status" aria-labelledby="successTitle" hidden>
                <h2 id="successTitle">完全感染</h2>
                <p>感染已擴散至所有方格。你的暗語是：</p>
                <div class="secret">1150606</div>
                <button class="close-button" id="closeButton" type="button">關閉訊息</button>
            </section>

            <section class="result-card failure-card" id="failureLayer" role="status" aria-labelledby="failureTitle" hidden>
                <h2 id="failureTitle">未完全感染</h2>
                <p id="failureText">感染停止時仍有空白方格。確認盤面後，可返回感染前狀態繼續調整。</p>
                <button class="confirm-button" id="confirmFailureButton" type="button">確認並返回調整</button>
            </section>

            <div class="actions">
                <button class="infect-button" id="infectButton" type="button" disabled>開始感染</button>
                <button class="reset-button" id="resetButton" type="button">重置</button>
            </div>
        </section>
    </main>

    <script>
        const ROWS = 10;
        const COLS = 7;
        const MAX_SEEDS = 12;
        const HOLE_ROWS = new Set([4, 5, 6, 7]);
        const HOLE_COLS = new Set([1, 2, 3]);
        const TARGET_CELLS = ROWS * COLS - HOLE_ROWS.size * HOLE_COLS.size;
        const STEP_DELAY = 360;

        const grid = document.getElementById("gameGrid");
        const selectedCount = document.getElementById("selectedCount");
        const phaseText = document.getElementById("phaseText");
        const message = document.getElementById("message");
        const infectButton = document.getElementById("infectButton");
        const resetButton = document.getElementById("resetButton");
        const successLayer = document.getElementById("successLayer");
        const closeButton = document.getElementById("closeButton");
        const failureLayer = document.getElementById("failureLayer");
        const failureText = document.getElementById("failureText");
        const confirmFailureButton = document.getElementById("confirmFailureButton");

        let cells = [];
        let infected = new Set();
        let isSpreading = false;
        let infectionSnapshot = null;

        function key(row, col) {
            return `${row}-${col}`;
        }

        function isHole(row, col) {
            return HOLE_ROWS.has(row) && HOLE_COLS.has(col);
        }

        function activeCells() {
            return cells.flat().filter(Boolean);
        }

        function setMessage(text, type = "") {
            message.textContent = text;
            message.className = `message ${type}`.trim();
        }

        function updateControls() {
            selectedCount.textContent = infected.size;
            infectButton.disabled = isSpreading || infected.size === 0;
            phaseText.textContent = isSpreading ? "感染擴散中" : infected.size > 0 ? "可啟動感染" : "設置感染源";
            phaseText.classList.toggle("ready", !isSpreading && infected.size > 0);
        }

        function paintCell(row, col, spreading = false) {
            const cell = cells[row][col];
            cell.classList.add("infected");
            if (spreading) {
                cell.classList.add("spreading");
                window.setTimeout(() => cell.classList.remove("spreading"), 520);
            }
        }

        function renderInfectedSet() {
            activeCells().forEach((cell) => cell.className = "cell");
            infected.forEach((cellKey) => {
                const [row, col] = cellKey.split("-").map(Number);
                paintCell(row, col);
            });
            updateControls();
        }

        function toggleCell(row, col) {
            if (isSpreading) return;

            const cellKey = key(row, col);
            if (infected.has(cellKey)) {
                infected.delete(cellKey);
                cells[row][col].classList.remove("infected");
                setMessage("已清除感染源，可繼續調整。");
            } else if (infected.size < MAX_SEEDS) {
                infected.add(cellKey);
                paintCell(row, col);
                setMessage(infected.size === MAX_SEEDS ? "已達 12 格上限，可以開始感染。" : "可以開始感染，或繼續增加感染源。");
            } else {
                setMessage("初始感染源最多只能選擇 12 格。", "error");
            }
            updateControls();
        }

        function createGrid() {
            for (let row = 0; row < ROWS; row += 1) {
                const rowCells = [];
                for (let col = 0; col < COLS; col += 1) {
                    if (isHole(row, col)) {
                        const hole = document.createElement("div");
                        hole.className = "cell hole";
                        hole.setAttribute("aria-hidden", "true");
                        grid.appendChild(hole);
                        rowCells.push(null);
                        continue;
                    }
                    const cell = document.createElement("button");
                    cell.className = "cell";
                    cell.type = "button";
                    cell.setAttribute("role", "gridcell");
                    cell.setAttribute("aria-label", `第 ${row + 1} 列，第 ${col + 1} 欄`);
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.addEventListener("click", () => toggleCell(row, col));
                    grid.appendChild(cell);
                    rowCells.push(cell);
                }
                cells.push(rowCells);
            }
        }

        function infectedNeighborCount(row, col) {
            return [
                [row - 1, col],
                [row + 1, col],
                [row, col - 1],
                [row, col + 1]
            ].filter(([nextRow, nextCol]) =>
                nextRow >= 0 &&
                nextRow < ROWS &&
                nextCol >= 0 &&
                nextCol < COLS &&
                infected.has(key(nextRow, nextCol))
            ).length;
        }

        function findNextWave() {
            const nextWave = [];
            for (let row = 0; row < ROWS; row += 1) {
                for (let col = 0; col < COLS; col += 1) {
                    if (!isHole(row, col) && !infected.has(key(row, col)) && infectedNeighborCount(row, col) >= 2) {
                        nextWave.push([row, col]);
                    }
                }
            }
            return nextWave;
        }

        function wait(milliseconds) {
            return new Promise((resolve) => window.setTimeout(resolve, milliseconds));
        }

        async function startInfection() {
            if (isSpreading || infected.size === 0) return;

            infectionSnapshot = new Set(infected);
            isSpreading = true;
            activeCells().forEach((cell) => cell.disabled = true);
            updateControls();
            setMessage("感染擴散中，請稍候...");

            let wave = findNextWave();
            while (wave.length > 0) {
                await wait(STEP_DELAY);
                wave.forEach(([row, col]) => {
                    infected.add(key(row, col));
                    paintCell(row, col, true);
                });
                setMessage(`感染擴散中：目前已有 ${infected.size} 格感染。`);
                wave = findNextWave();
            }

            isSpreading = false;
            activeCells().forEach((cell) => cell.disabled = false);

            if (infected.size === TARGET_CELLS) {
                phaseText.textContent = "完全感染";
                phaseText.classList.add("ready");
                setMessage("感染成功：所有方格都已被感染。", "success");
                successLayer.hidden = false;
                closeButton.focus();
            } else {
                const remaining = TARGET_CELLS - infected.size;
                failureText.textContent = `感染停止時仍有 ${remaining} 格空白。確認目前盤面後，可返回感染前狀態繼續調整。`;
                setMessage(`未完全感染，仍有 ${remaining} 格空白。`, "error");
                activeCells().forEach((cell) => cell.disabled = true);
                failureLayer.hidden = false;
                confirmFailureButton.focus();
            }
        }

        function restoreAfterFailure() {
            infected = new Set(infectionSnapshot);
            infectionSnapshot = null;
            failureLayer.hidden = true;
            renderInfectedSet();
            activeCells().forEach((cell) => cell.disabled = false);
            setMessage("已回復至感染前狀態，請調整感染源。", "error");
        }

        function resetGame() {
            if (isSpreading) return;
            infected.clear();
            infectionSnapshot = null;
            successLayer.hidden = true;
            failureLayer.hidden = true;
            renderInfectedSet();
            setMessage("請選擇至少 1 個初始感染源。");
        }

        infectButton.addEventListener("click", startInfection);
        resetButton.addEventListener("click", resetGame);
        closeButton.addEventListener("click", () => {
            successLayer.hidden = true;
        });
        confirmFailureButton.addEventListener("click", restoreAfterFailure);

        createGrid();
        updateControls();
    </script>
</body>

</html>
